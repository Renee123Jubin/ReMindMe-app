<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 ReMindMe - Your Smart Reminder App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFB6C1',
                        secondary: '#DDA0DD',
                        accent: '#98FB98'
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'rainbow': 'rainbow 3s ease-in-out infinite'
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 7%': { transform: 'rotate(0deg)' },
                            '15%': { transform: 'rotate(-15deg)' },
                            '20%': { transform: 'rotate(10deg)' },
                            '25%': { transform: 'rotate(-10deg)' },
                            '30%': { transform: 'rotate(6deg)' },
                            '35%': { transform: 'rotate(-4deg)' },
                            '40%, 100%': { transform: 'rotate(0deg)' }
                        },
                        rainbow: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .rainbow-text {
            background: linear-gradient(45deg, #ff0000, #ff8000, #ffff00, #80ff00, #00ff00, #00ff80, #00ffff, #0080ff, #0000ff, #8000ff, #ff0080);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s ease-in-out infinite;
        }
        
        .card-fun {
            background: linear-gradient(135deg, #fff, #f8fafc);
            border: 4px solid #98FB98;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        
        .card-fun:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.15);
        }
        
        .btn-fun {
            background: linear-gradient(45deg, #FFB6C1, #98FB98);
            border: 3px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .btn-fun:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }
        
        .reminder-item {
            transition: all 0.3s ease;
        }
        
        .reminder-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .comic-sans {
            font-family: "Comic Sans MS", cursive !important;
        }
        
        .simple-mode {
            font-size: 1.25rem;
        }
        
        .large-text {
            font-size: 1.5rem;
        }
    </style>
</head>
<body class="bg-pink-50 min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b-4 border-primary sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <h1 class="text-4xl font-bold rainbow-text">🎯 ReMindMe</h1>
                        <div class="hidden md:flex items-center gap-2 text-sm opacity-75">
                            <span id="activeCount">0 active</span>
                            <span>•</span>
                            <span id="completedCount">0 completed</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button onclick="showAI()" class="bg-purple-100 hover:bg-purple-200 text-purple-700 font-semibold py-2 px-4 rounded-xl transition-all flex items-center gap-2">
                            🤖 <span class="hidden sm:inline">Remi</span>
                        </button>
                        
                        <button onclick="showQuickActions()" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-semibold py-2 px-4 rounded-xl transition-all flex items-center gap-2">
                            ⚡ <span class="hidden sm:inline">Quick</span>
                        </button>
                        
                        <button onclick="showThemes()" class="bg-pink-100 hover:bg-pink-200 text-pink-700 font-semibold py-2 px-4 rounded-xl transition-all flex items-center gap-2">
                            🎨 <span class="hidden sm:inline">Themes</span>
                        </button>
                        
                        <button onclick="showSettings()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 font-semibold py-2 px-4 rounded-xl transition-all flex items-center gap-2">
                            ⚙️ <span class="hidden sm:inline">Settings</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- Search Bar -->
            <div class="card-fun rounded-2xl p-6 mb-8">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 relative">
                        <input 
                            type="text" 
                            id="searchInput"
                            placeholder="Search your reminders... 🔍"
                            class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none focus:ring-4 focus:ring-primary/20 text-lg"
                            onkeyup="filterReminders()"
                        />
                    </div>
                    
                    <div class="flex gap-2">
                        <select id="priorityFilter" onchange="filterReminders()" class="px-4 py-3 border-2 border-primary rounded-xl focus:outline-none">
                            <option value="all">All Priorities</option>
                            <option value="high">🔴 High</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="low">🟢 Low</option>
                        </select>
                        
                        <select id="statusFilter" onchange="filterReminders()" class="px-4 py-3 border-2 border-primary rounded-xl focus:outline-none">
                            <option value="all">All Status</option>
                            <option value="pending">📋 Pending</option>
                            <option value="completed">✅ Completed</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Reminders List -->
            <div id="remindersList" class="space-y-4">
                <!-- Welcome message for first time -->
                <div id="welcomeMessage" class="card-fun text-center py-12 rounded-3xl">
                    <div class="text-6xl mb-4">🎉</div>
                    <h3 class="text-3xl font-bold mb-4 rainbow-text">Welcome to ReMindMe!</h3>
                    <p class="text-xl opacity-75 mb-8">Create your first reminder to get started! ✨</p>
                    <div class="flex gap-4 justify-center flex-wrap">
                        <button onclick="showForm()" class="btn-fun text-white font-bold py-4 px-8 rounded-full text-xl">
                            Create First Reminder 🚀
                        </button>
                        <button onclick="showQuickActions()" class="bg-secondary hover:bg-purple-300 text-purple-800 font-bold py-4 px-8 rounded-full text-xl transition-all">
                            Quick Actions ⚡
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button 
            onclick="showForm()" 
            class="fixed bottom-6 right-6 w-16 h-16 btn-fun rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-2xl animate-bounce-slow hover:animate-none z-50"
        >
            ➕
        </button>

        <!-- Modals will be inserted here -->
        <div id="modals"></div>
    </div>

    <script>
        // Global state
        let reminders = JSON.parse(localStorage.getItem('remindme_reminders') || '[]');
        let settings = JSON.parse(localStorage.getItem('remindme_settings') || '{"theme":"pastelDream","comicSansMode":false,"simpleMode":false,"largeText":false}');

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadReminders();
            applySettings();
            updateCounts();
        });

        // Save data
        function saveReminders() {
            localStorage.setItem('remindme_reminders', JSON.stringify(reminders));
            updateCounts();
        }

        function saveSettings() {
            localStorage.setItem('remindme_settings', JSON.stringify(settings));
        }

        // Load and display reminders
        function loadReminders() {
            const container = document.getElementById('remindersList');
            const welcomeMsg = document.getElementById('welcomeMessage');
            
            if (reminders.length === 0) {
                welcomeMsg.style.display = 'block';
                return;
            } else {
                welcomeMsg.style.display = 'none';
            }

            container.innerHTML = reminders.map(reminder => `
                <div class="reminder-item card-fun p-6 rounded-2xl border-l-8" style="border-left-color: ${reminder.colorTag}">
                    <div class="flex items-start gap-4">
                        <div class="text-3xl flex-shrink-0">${reminder.emojiTag}</div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-2">
                                <h3 class="text-xl font-bold ${reminder.isCompleted ? 'line-through opacity-60' : ''}">${reminder.title}</h3>
                                <div class="w-4 h-4 rounded-full" style="background-color: ${reminder.colorTag}"></div>
                            </div>
                            
                            ${reminder.description ? `<p class="text-gray-600 mb-2">${reminder.description}</p>` : ''}
                            
                            <div class="flex items-center gap-4 text-sm text-gray-500 mb-3">
                                <span>📅 ${formatDate(new Date(reminder.dueDate))}</span>
                                <span>🕐 ${formatTime(new Date(reminder.dueDate))}</span>
                                <span class="px-2 py-1 rounded-full text-xs font-bold ${getPriorityColor(reminder.priority)}">
                                    ${reminder.priority.toUpperCase()}
                                </span>
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-2">
                            <button onclick="toggleComplete('${reminder.id}')" class="p-2 rounded-lg transition-all ${reminder.isCompleted ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}" title="${reminder.isCompleted ? 'Mark as pending' : 'Mark as completed'}">
                                ✅
                            </button>
                            <button onclick="shareReminder('${reminder.id}')" class="p-2 rounded-lg bg-purple-100 text-purple-600 hover:bg-purple-200 transition-all" title="Share reminder">
                                🔗
                            </button>
                            <button onclick="editReminder('${reminder.id}')" class="p-2 rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 transition-all" title="Edit reminder">
                                ✏️
                            </button>
                            <button onclick="deleteReminder('${reminder.id}')" class="p-2 rounded-lg bg-red-100 text-red-600 hover:bg-red-200 transition-all" title="Delete reminder">
                                🗑️
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Utility functions
        function formatDate(date) {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            if (date.toDateString() === today.toDateString()) return '🌟 Today';
            if (date.toDateString() === tomorrow.toDateString()) return '⭐ Tomorrow';
            if (date < today) return '⚠️ Overdue';
            return date.toLocaleDateString();
        }

        function formatTime(date) {
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function getPriorityColor(priority) {
            switch(priority) {
                case 'high': return 'bg-red-100 text-red-600';
                case 'medium': return 'bg-yellow-100 text-yellow-600';
                case 'low': return 'bg-green-100 text-green-600';
                default: return 'bg-gray-100 text-gray-600';
            }
        }

        function updateCounts() {
            const active = reminders.filter(r => !r.isCompleted).length;
            const completed = reminders.filter(r => r.isCompleted).length;
            document.getElementById('activeCount').textContent = `${active} active`;
            document.getElementById('completedCount').textContent = `${completed} completed`;
        }

        // Reminder actions
        function toggleComplete(id) {
            const reminder = reminders.find(r => r.id === id);
            if (reminder) {
                reminder.isCompleted = !reminder.isCompleted;
                reminder.updatedAt = new Date().toISOString();
                saveReminders();
                loadReminders();
            }
        }

        function deleteReminder(id) {
            if (confirm('Are you sure you want to delete this reminder? 🗑️')) {
                reminders = reminders.filter(r => r.id !== id);
                saveReminders();
                loadReminders();
            }
        }

        function editReminder(id) {
            // For simplicity, just show the form with the reminder data
            showForm(id);
        }

        function shareReminder(id) {
            const reminder = reminders.find(r => r.id === id);
            if (reminder) {
                const shareText = `${reminder.emojiTag} Reminder: ${reminder.title}\\nDue: ${formatDate(new Date(reminder.dueDate))} at ${formatTime(new Date(reminder.dueDate))}\\n\\nStay organized with ReMindMe! 🎯`;
                
                if (navigator.share) {
                    navigator.share({
                        title: 'ReMindMe Reminder',
                        text: shareText,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(shareText).then(() => {
                        alert('Reminder copied to clipboard! 📋');
                    });
                }
            }
        }

        // Filter reminders
        function filterReminders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const priority = document.getElementById('priorityFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const filtered = reminders.filter(reminder => {
                const matchesSearch = reminder.title.toLowerCase().includes(search) || 
                                    (reminder.description && reminder.description.toLowerCase().includes(search));
                const matchesPriority = priority === 'all' || reminder.priority === priority;
                const matchesStatus = status === 'all' || 
                                    (status === 'completed' && reminder.isCompleted) ||
                                    (status === 'pending' && !reminder.isCompleted);
                
                return matchesSearch && matchesPriority && matchesStatus;
            });
            
            // Update display with filtered results
            const container = document.getElementById('remindersList');
            if (filtered.length === 0 && (search || priority !== 'all' || status !== 'all')) {
                container.innerHTML = `
                    <div class="card-fun text-center py-12 rounded-3xl">
                        <div class="text-6xl mb-4">🔍</div>
                        <h3 class="text-2xl font-bold mb-2">No matching reminders found!</h3>
                        <p class="text-lg opacity-75">Try adjusting your search or filters</p>
                    </div>
                `;
            } else {
                // Temporarily replace reminders for display
                const originalReminders = reminders;
                reminders = filtered;
                loadReminders();
                reminders = originalReminders;
            }
        }

        // Show modals
        function showForm(editId = null) {
            const reminder = editId ? reminders.find(r => r.id === editId) : null;
            
            document.getElementById('modals').innerHTML = `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div class="card-fun max-w-2xl w-full max-h-[90vh] overflow-y-auto rounded-3xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-3xl font-bold rainbow-text">
                                ${editId ? '✏️ Edit Reminder' : '✨ Create New Reminder'}
                            </h2>
                            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 p-2 rounded-full hover:bg-gray-100">
                                ❌
                            </button>
                        </div>
                        
                        <form onsubmit="saveReminder(event, '${editId || ''}')">
                            <div class="space-y-6">
                                <div>
                                    <label class="block text-lg font-bold mb-2">📝 Reminder Title</label>
                                    <input type="text" id="reminderTitle" value="${reminder ? reminder.title : ''}" placeholder="What do you need to remember? 🤔" class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none focus:ring-4 focus:ring-primary/20 text-lg" required>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-lg font-bold mb-2">📅 Date</label>
                                        <input type="date" id="reminderDate" value="${reminder ? new Date(reminder.dueDate).toISOString().split('T')[0] : ''}" class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none" required>
                                    </div>
                                    <div>
                                        <label class="block text-lg font-bold mb-2">🕐 Time</label>
                                        <input type="time" id="reminderTime" value="${reminder ? new Date(reminder.dueDate).toTimeString().slice(0,5) : ''}" class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none" required>
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="block text-lg font-bold mb-2">🚨 Priority</label>
                                    <div class="grid grid-cols-3 gap-2">
                                        <button type="button" onclick="setPriority('low')" class="priority-btn p-3 rounded-xl border-2 font-bold transition-all bg-green-100 border-green-300 ${reminder && reminder.priority === 'low' ? 'scale-105 ring-2 ring-green-400' : ''}">🟢 Low</button>
                                        <button type="button" onclick="setPriority('medium')" class="priority-btn p-3 rounded-xl border-2 font-bold transition-all bg-yellow-100 border-yellow-300 ${!reminder || reminder.priority === 'medium' ? 'scale-105 ring-2 ring-yellow-400' : ''}">🟡 Medium</button>
                                        <button type="button" onclick="setPriority('high')" class="priority-btn p-3 rounded-xl border-2 font-bold transition-all bg-red-100 border-red-300 ${reminder && reminder.priority === 'high' ? 'scale-105 ring-2 ring-red-400' : ''}">🔴 High</button>
                                    </div>
                                    <input type="hidden" id="reminderPriority" value="${reminder ? reminder.priority : 'medium'}">
                                </div>
                                
                                <div>
                                    <label class="block text-lg font-bold mb-2">😀 Emoji Tag</label>
                                    <div class="flex gap-2 flex-wrap mb-2">
                                        ${['⭐', '❤️', '💙', '💚', '💛', '🧡', '💜', '🎉', '🎊', '🎈', '💼', '🏠', '🍕', '☕', '🎵'].map(emoji => 
                                            `<button type="button" onclick="setEmoji('${emoji}')" class="emoji-btn w-12 h-12 text-2xl rounded-xl hover:bg-primary/20 transition-all ${reminder && reminder.emojiTag === emoji ? 'bg-primary/30 scale-110' : ''}">${emoji}</button>`
                                        ).join('')}
                                    </div>
                                    <input type="hidden" id="reminderEmoji" value="${reminder ? reminder.emojiTag : '⭐'}">
                                </div>
                                
                                <div>
                                    <label class="block text-lg font-bold mb-2">🎨 Color Tag</label>
                                    <div class="flex gap-2 flex-wrap mb-2">
                                        ${['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE'].map(color => 
                                            `<button type="button" onclick="setColor('${color}')" class="color-btn w-8 h-8 rounded-full border-4 border-white shadow-lg hover:scale-125 transition-all ${reminder && reminder.colorTag === color ? 'ring-4 ring-primary scale-125' : ''}" style="background-color: ${color}"></button>`
                                        ).join('')}
                                    </div>
                                    <input type="hidden" id="reminderColor" value="${reminder ? reminder.colorTag : '#FF6B6B'}">
                                </div>
                                
                                <div>
                                    <label class="block text-lg font-bold mb-2">📄 Notes (Optional)</label>
                                    <textarea id="reminderDescription" placeholder="Add any extra details here... 📝" class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none focus:ring-4 focus:ring-primary/20 resize-none" rows="3">${reminder ? reminder.description || '' : ''}</textarea>
                                </div>
                                
                                <div class="flex gap-4 pt-6">
                                    <button type="submit" class="btn-fun text-white font-bold py-4 px-8 rounded-full flex-1 text-xl">
                                        ${editId ? '💾 Update Reminder' : '✨ Create Reminder'}
                                    </button>
                                    <button type="button" onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-8 rounded-full">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function showQuickActions() {
            const templates = [
                { title: 'Coffee break', emoji: '☕', color: '#8B4513', priority: 'low', time: 15 },
                { title: 'Upcoming meeting', emoji: '💼', color: '#2563eb', priority: 'high', time: 60 },
                { title: 'Take medicine', emoji: '💊', color: '#dc2626', priority: 'high', time: 30 },
                { title: 'Buy groceries', emoji: '🛒', color: '#16a34a', priority: 'medium', time: 1440 },
                { title: 'Workout time', emoji: '💪', color: '#ea580c', priority: 'medium', time: 60 },
                { title: 'Make important call', emoji: '📞', color: '#7c3aed', priority: 'medium', time: 30 }
            ];

            document.getElementById('modals').innerHTML = `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div class="card-fun max-w-2xl w-full max-h-[90vh] overflow-y-auto rounded-3xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-3xl font-bold rainbow-text">⚡ Quick Actions</h2>
                            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 p-2 rounded-full hover:bg-gray-100">❌</button>
                        </div>
                        
                        <p class="text-lg opacity-75 mb-6 text-center">Create reminders instantly with pre-made templates! ⚡</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                            ${templates.map(template => `
                                <button onclick="createQuickReminder('${template.title}', '${template.emoji}', '${template.color}', '${template.priority}', ${template.time})" class="card-fun hover:scale-105 transition-all p-4 text-left rounded-2xl border-l-6" style="border-left-color: ${template.color}">
                                    <div class="flex items-center gap-3">
                                        <div class="text-3xl">${template.emoji}</div>
                                        <div class="flex-1">
                                            <h4 class="font-bold text-lg">${template.title}</h4>
                                            <div class="flex items-center gap-2 text-sm opacity-75">
                                                <span class="px-2 py-1 rounded-full text-xs font-bold ${getPriorityColor(template.priority)}">${template.priority.toUpperCase()}</span>
                                                <span>•</span>
                                                <span>in ${template.time >= 1440 ? Math.floor(template.time/1440) + ' day' : template.time >= 60 ? Math.floor(template.time/60) + ' hour' : template.time + ' min'}</span>
                                            </div>
                                        </div>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                        
                        <div class="card-fun bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl">
                            <h3 class="text-xl font-bold mb-4">✨ Custom Quick Reminder</h3>
                            <form onsubmit="createCustomQuick(event)">
                                <div class="space-y-4">
                                    <input type="text" id="quickTitle" placeholder="What do you need to remember? 🤔" class="w-full px-4 py-3 border-2 border-primary rounded-xl focus:outline-none" required>
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                        <button type="button" onclick="setQuickTime(15)" class="quick-time-btn p-3 rounded-xl text-sm font-bold border-2 border-purple-200 text-purple-600 hover:border-purple-300">15 minutes</button>
                                        <button type="button" onclick="setQuickTime(60)" class="quick-time-btn p-3 rounded-xl text-sm font-bold border-2 border-purple-200 text-purple-600 hover:border-purple-300 bg-purple-500 text-white scale-105">1 hour</button>
                                        <button type="button" onclick="setQuickTime(1440)" class="quick-time-btn p-3 rounded-xl text-sm font-bold border-2 border-purple-200 text-purple-600 hover:border-purple-300">1 day</button>

                        </div>
                    </div>
                </div>
            `;
        }

        function showThemes() {
            const themes = [
                { id: 'pastelDream', name: '🌸 Pastel Dream', colors: ['#FFB6C1', '#DDA0DD', '#FFF0F5'] },
                { id: 'cottagecore', name: '🌿 Cottagecore', colors: ['#8B5A3C', '#A0522D', '#F5F5DC'] },
                { id: 'starlight', name: '✨ Starlight', colors: ['#4A148C', '#7B1FA2', '#0D1B2A'] },

                        <div class="flex justify-between items-center mb-6">

        function showSettings() {
            document.getElementById('modals').innerHTML = `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div class="card-fun max-w-2xl w-full max-h-[90vh] overflow-y-auto rounded-3xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-3xl font-bold rainbow-text">⚙️ Settings</h2>
                            <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 p-2 rounded-full hover:bg-gray-100">❌</button>
                        </div>
                        
                        <div class="space-y-6">
                            <div>
                                <h3 class="text-xl font-bold mb-4">🎨 Appearance</h3>
                                <div class="space-y-3">
                                    <label class="flex items-center gap-3">
                                        <input type="checkbox" ${settings.comicSansMode ? 'checked' : ''} onchange="toggleSetting('comicSansMode')" class="w-5 h-5 text-pink-600 rounded">
                                        <span class="text-lg">💅 Comic Sans Mode (Fun fonts!)</span>
                                    </label>
                                    
                                    <label class="flex items-center gap-3">
                                        <input type="checkbox" ${settings.simpleMode ? 'checked' : ''} onchange="toggleSetting('simpleMode')" class="w-5 h-5 text-pink-600 rounded">
                                        <span class="text-lg">🎯 Simple Mode (Easier to use)</span>
                                    </label>
                                    
                                    <label class="flex items-center gap-3">
                                        <input type="checkbox" ${settings.largeText ? 'checked' : ''} onchange="toggleSetting('largeText')" class="w-5 h-5 text-pink-600 rounded">

                                    </label>
                                </div>
                            </div>
                            
                            <div class="card bg-gray-50 rounded-2xl">
                                <h4 class="font-bold text-gray-800 mb-2">ℹ️ About ReMindMe</h4>

                                    Version 1.0 - A fun and colorful reminder app built with love! ❤️<br>

        // Modal and form functions
        function closeModal() {
            document.getElementById('modals').innerHTML = '';
        }

        function setPriority(priority) {
            document.getElementById('reminderPriority').value = priority;
            document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('scale-105', 'ring-2', 'ring-green-400', 'ring-yellow-400', 'ring-red-400'));
            event.target.classList.add('scale-105', 'ring-2', `ring-${priority === 'low' ? 'green' : priority === 'medium' ? 'yellow' : 'red'}-400`);
        }

        function setEmoji(emoji) {
            document.getElementById('reminderEmoji').value = emoji;
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('bg-primary/30', 'scale-110'));
            event.target.classList.add('bg-primary/30', 'scale-110');
        }

        function setColor(color) {
            document.getElementById('reminderColor').value = color;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('ring-4', 'ring-primary', 'scale-125'));
            event.target.classList.add('ring-4', 'ring-primary', 'scale-125');
        }

        function setQuickTime(minutes) {
            document.getElementById('quickTime').value = minutes;
            document.querySelectorAll('.quick-time-btn').forEach(btn => {
                btn.classList.remove('bg-purple-500', 'text-white', 'scale-105');
                btn.classList.add('border-purple-200', 'text-purple-600');
            });
            event.target.classList.add('bg-purple-500', 'text-white', 'scale-105');
            event.target.classList.remove('border-purple-200', 'text-purple-600');
        }

        function saveReminder(event, editId = '') {
            event.preventDefault();
            
            const title = document.getElementById('reminderTitle').value.trim();
            const date = document.getElementById('reminderDate').value;
            const time = document.getElementById('reminderTime').value;
            const priority = document.getElementById('reminderPriority').value;
            const emoji = document.getElementById('reminderEmoji').value;
            const color = document.getElementById('reminderColor').value;
            const description = document.getElementById('reminderDescription').value.trim();
            
            if (!title || !date || !time) {
                alert('Please fill in all required fields! 📝');
                return;
            }
            
            const dueDate = new Date(`${date}T${time}`);
            if (dueDate <= new Date()) {
                alert('Please set a future date and time! 🚀');
                return;
            }
            
            const reminderData = {
                id: editId || `reminder_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title,
                description,
                dueDate: dueDate.toISOString(),
                priority,
                emojiTag: emoji,
                colorTag: color,
                isCompleted: false,
                createdAt: editId ? reminders.find(r => r.id === editId).createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            if (editId) {
                const index = reminders.findIndex(r => r.id === editId);
                reminders[index] = { ...reminders[index], ...reminderData };
            } else {
                reminders.push(reminderData);
            }
            
            saveReminders();
            loadReminders();
            closeModal();
        }

        function createQuickReminder(title, emoji, color, priority, minutes) {
            const dueDate = new Date();
            dueDate.setMinutes(dueDate.getMinutes() + minutes);
            
            const reminder = {
                id: `reminder_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title,
                description: '',
                dueDate: dueDate.toISOString(),
                priority,
                emojiTag: emoji,
                colorTag: color,
                isCompleted: false,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            reminders.push(reminder);
            saveReminders();
            loadReminders();
            closeModal();
        }

        function createCustomQuick(event) {
            event.preventDefault();
            const title = document.getElementById('quickTitle').value.trim();
            const minutes = parseInt(document.getElementById('quickTime').value) || 60;
            
            if (!title) return;
            
            createQuickReminder(title, '⭐', '#3b82f6', 'medium', minutes);
        }

        function sendAIMessage(message = null) {
            const input = document.getElementById('aiInput');
            const text = message || input.value.trim();
            if (!text) return;
            
            const messagesContainer = document.getElementById('aiMessages');
            
            // Add user message
            messagesContainer.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-2xl p-4 max-w-[80%]">
                        <div class="flex items-start gap-2">
                            <div class="text-xl">👤</div>
                            <div>
                                <p>${text}</p>
                                <p class="text-xs opacity-60 mt-2">${new Date().toLocaleTimeString()}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            input.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Simulate AI response
            setTimeout(() => {
                let response = "I'd love to help you with that! 🤖 ";
                
                if (text.toLowerCase().includes('remind me') || text.toLowerCase().includes('create')) {
                    response = "Perfect! I can help you create a reminder. Try clicking the 'Create Reminder' button or use Quick Actions for instant templates! ⚡";
                } else if (text.toLowerCase().includes('show') || text.toLowerCase().includes('list')) {
                    const activeReminders = reminders.filter(r => !r.isCompleted);
                    if (activeReminders.length === 0) {
                        response = "You don't have any active reminders right now! 🎉 Perfect time to add some new ones!";
                    } else {
                        response = `You have ${activeReminders.length} active reminder${activeReminders.length > 1 ? 's' : ''}! Check them out in your main list above. 📋`;
                    }
                } else if (text.toLowerCase().includes('help')) {
                    response = "I'm here to help! 🌟 I can help you create reminders, show your tasks, and organize your schedule. Just tell me what you need in plain English!";
                } else {
                    response = "That's interesting! I'm still learning, but I'm here to help with your reminders. Try asking me to create a reminder or show your tasks! 😊";
                }
                
                messagesContainer.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white shadow-lg border-2 border-primary/20 rounded-2xl p-4 max-w-[80%]">
                            <div class="flex items-start gap-2">
                                <div class="text-xl">🤖</div>
                                <div>
                                    <p>${response}</p>
                                    <p class="text-xs opacity-60 mt-2">${new Date().toLocaleTimeString()}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 1000);
        }

        function toggleSetting(setting) {
            settings[setting] = !settings[setting];
            saveSettings();
            applySettings();
        }

        function applyTheme(themeId) {
            settings.theme = themeId;
            saveSettings();
            applySettings();
            closeModal();
        }

        function applySettings() {
            const body = document.body;
            
            // Apply theme colors
            const themes = {
                pastelDream: { bg: 'bg-pink-50', primary: '#FFB6C1' },
                cottagecore: { bg: 'bg-amber-50', primary: '#8B5A3C' },
                starlight: { bg: 'bg-indigo-900', primary: '#7B1FA2' },
                neonVibes: { bg: 'bg-black', primary: '#FF1493' },
                comicSans: { bg: 'bg-yellow-50', primary: '#FF69B4' }
            };
            
            // Remove old theme classes
            body.className = body.className.replace(/bg-\w+-\d+/g, '');
            
            const currentTheme = themes[settings.theme] || themes.pastelDream;
            body.classList.add(currentTheme.bg, 'min-h-screen');
            
            // Apply font settings
            if (settings.comicSansMode) {
                body.classList.add('comic-sans');
            } else {
                body.classList.remove('comic-sans');
            }
            
            if (settings.simpleMode) {
                body.classList.add('simple-mode');
            } else {
                body.classList.remove('simple-mode');
            }
            
            if (settings.largeText) {
                body.classList.add('large-text');
            } else {
                body.classList.remove('large-text');
            }
        }
    </script>
</body>
</html>
